services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/prescription_agent
      AUDIT_LOG_PATH: artifacts/audit.log
    depends_on:
      - db
    volumes:
      - ./artifacts:/app/artifacts
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: prescription_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
